<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="wrapx">
    <header class="ttop">
      <p class="tinyt">CryptoTrackr</p>
      <h1>Crypto Dashboard</h1>
      <p class="minimsg">Simple list of top coins with price and daily change.</p>
    </header>

    <section class="controls" aria-label="Search and sort coins">
      <input id="search" type="text" placeholder="Search by name or symbol">
      <button id="clear-search" type="button" aria-label="Clear search">✕</button>
      <select id="sort">
        <option value="market_desc">Market Cap: High to Low</option>
        <option value="price_desc">Price: High to Low</option>
        <option value="price_asc">Price: Low to High</option>
        <option value="change_desc">24h Change: High to Low</option>
        <option value="change_asc">24h Change: Low to High</option>
      </select>
      <button id="refresh-btn" type="button" aria-label="Refresh data">Refresh</button>
    </section>

    <p id="status" class="msgx">Loading...</p>
    <section id="crypto-container" class="boxlist" ></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
